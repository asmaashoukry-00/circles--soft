<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title data-ar="اتصل بنا | سيركلز سوفت" data-en="Contact Us | Circles Soft">اتصل بنا | سيركلز سوفت</title>     <!-- light mode -->
<meta name="color-scheme" content="only light">
<meta name="supported-color-schemes" content="only light">
<link rel="stylesheet" href="/light-mode.css">
<!-- ----------- -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="/favicon.png">
    <link rel="stylesheet" href="contact.css">
     <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <!-- navbar & footer styles -->
    <link rel="stylesheet" href="/footer/footer.css" />
    <link rel="stylesheet" href="/navbar/navbar.css" />
    <link rel="icon" href=" /global/favicon.png">
</head>
<body class="contact-page-luxury">

    <!-- navbar -->
    <div id="navbar-placeholder"></div>

    <div class="luxury-bg-elements">
        <div class="circle-blur"></div>
    </div>

    <!-- تم تغيير h-full إلى min-h-screen وإضافة padding مريح -->
    <main class="main-wrapper">
        <div class="content-container">
            
            <div class="contact-master-card">
                
                <div class="contact-header">
                    <span class="ultra-label lang-key" data-ar="تواصــــل معنــا" data-en="Contact Us">Contact Us</span>
                    <h1 class="contact-main-title">
                        <span class="lang-key" data-ar="لنصنع" data-en="Let's Make">Let's Make</span>
                        <span class="lang-key" style="color: #4F46E5;" data-ar="الفارق" data-en=" the Difference"> the Difference</span>
                        <span class="lang-key" data-ar="معاً" data-en="Together">Together</span>
                    </h1>
                </div>

                <div class="contact-grid">
                    
                    <!-- الجانب الأيمن: المعلومات -->
                    <div class="info-section">
                        <div class="minimal-info-stack">
                            
                            <div class="info-item-luxury">
                                <div class="dot-indicator"></div>
                                <small class="lang-key" data-ar="رقم الاتصــال" data-en="Phone Number">Phone Number</small>
                                <p dir="ltr" class="phone-number">+962 78 886 8944</p>
                                <p dir="ltr" class="phone-number">+966 54 386 8253</p>
                            </div>
                            <div class="info-item-luxury">
                                <div class="dot-indicator"></div>
                                <small class="lang-key" data-ar="الدعم الفني" data-en="Tech Support">Tech Support</small>
                                <p>info@circlessoft.com</p>
                            </div>
                             <div class="info-item-luxury">
                                <div class="dot-indicator"></div>
                                <small class="lang-key" data-ar="المكتـب الرئيسي" data-en="Head Office">Head Office</small>
                                <p>Riyadh </p>
                                <p>Amman      </p>
                               
                                <!-- <p>عمــان |   الأردن</p> -->
                            </div>
                        </div>

                        <!-- الأيقونات الأربعة -->
                        <div class="social-wrapper-contact">
                            <a href="https://www.linkedin.com/company/circlessoft/" target="_blank" class="social-icon-contact linkedin"><i class="fab fa-linkedin-in"></i></a>
                            <a href="https://x.com/CirclesSoft" target="_blank" class="social-icon-contact twitter-x"><i class="fab fa-x-twitter"></i></a>
                            <a href="https://www.instagram.com/circlessoft/" target="_blank" class="social-icon-contact instagram"><i class="fab fa-instagram"></i></a>
                            <a href="https://www.facebook.com/CirclesSoftHR?_rdc=1&_rdr#" target="_blank" class="social-icon-contact facebook"><i class="fab fa-facebook-f"></i></a>
                        </div>
                    </div>

                    <!-- الجانب الأيسر: الفورم -->
                    <div class="form-section">
                        <form id="contact-form-premium" class="premium-form">
                            <div class="form-inputs-grid">
                                <div class="input-luxury-group">
                                    <input type="text" required placeholder=" ">
                                    <label class="lang-key" data-ar="الأسم الكامل" data-en="Full Name">Full Name</label>
                                    <span class="input-border"></span>
                                </div>
                                <div class="input-luxury-group">
                                    <input type="email" required placeholder=" ">
                                    <label class="lang-key" data-ar="بريد العمل" data-en="Work Email">Work Email</label>
                                    <span class="input-border"></span>
                                </div>
                                <div class="input-luxury-group">
                                    <input type="tel" required placeholder=" ">
                                    <label class="lang-key" data-ar="رقم الجوال" data-en="Mobile Number">Mobile Number</label>
                                    <span class="input-border"></span>
                                </div>
                                <!-- <div class="input-luxury-group">
                                    <select required>
                                        <option value="" disabled selected hidden></option>
                                        <option class="lang-key" data-ar="استفسار عن نظام ERP" data-en="ERP System Inquiry">ERP System Inquiry</option>
                                        <option class="lang-key" data-ar="حلول الموارد البشرية" data-en="HR Solutions">HR Solutions</option>
                                        <option class="lang-key" data-ar="طلب عرض سعر" data-en="Request a Quote">Request a Quote</option>
                                    </select>
                                    <label class="lang-key" data-ar="نوع الخدمة" data-en="Service Type">Service Type</label>
                                    <span class="input-border"></span>
                                </div> -->
                                <div class="input-luxury-group full-width">
                                    <textarea rows="2" required placeholder=" "></textarea>
                                    <label class="lang-key" data-ar="رسالتك (اختياري)" data-en="Your Message (Optional)">Your Message (Optional)</label>
                                    <span class="input-border"></span>
                                </div>
                            </div>

                            <div class="form-footer">
                                <button type="submit" class="btn">
                                    <span class="lang-key" data-ar="اطلب عرض توضيحي" data-en="Request a Demo">Request a Demo</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- footer -->
    <div id="footer-placeholder"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        gsap.from(".contact-master-card", { duration: 1.5, y: 50, opacity: 0, ease: "expo.out" });
        gsap.from(".input-luxury-group", { duration: 1, y: 20, opacity: 0, stagger: 0.1, ease: "power3.out", delay: 0.5 });
    </script>
    <script src="/footer/footer.js"></script>
    <script src="/navbar/navbar.js"></script>
    <script src="/english-script.js"></script>
</body>
</html>
